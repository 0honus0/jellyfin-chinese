name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天 00:00 运行一次
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check for updates
        id: check
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/jellyfin/jellyfin/releases/latest | jq -r .tag_name)
          echo "latest_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          
          if git rev-parse "$UPSTREAM_TAG" >/dev/null 2>&1; then
            echo "Up-to-date: $UPSTREAM_TAG already exists."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "New version found: $UPSTREAM_TAG"
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.update_needed == 'true'
        run: |
          TAG=${{ steps.check.outputs.latest_tag }}
          # 去掉 'v' 前缀
          VERSION=${TAG#v}
          sed -i "s|FROM jellyfin/jellyfin:.*|FROM jellyfin/jellyfin:$VERSION|" Dockerfile

      - name: Commit and Push
        if: steps.check.outputs.update_needed == 'true'
        run: |
          TAG=${{ steps.check.outputs.latest_tag }}
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Update to upstream version $TAG"
          git tag "$TAG"
          git push origin master --tags
